version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: zemen-db
    environment:
      POSTGRES_DB: zemen
      POSTGRES_USER: zemen
      POSTGRES_PASSWORD: zemen_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zemen -d zemen"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
